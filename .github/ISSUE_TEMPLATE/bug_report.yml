name: Bug report
description: Report something broken or surprising.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include the command, repository shape, and output.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Package version, commit SHA, or action ref.
    validations:
      required: true

