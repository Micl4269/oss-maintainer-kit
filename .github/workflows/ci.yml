name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: PYTHONPATH=src python -m unittest discover -s tests -v
      - name: Scan tracked files for secrets
        run: PYTHONPATH=src python -m oss_maintainer_kit security-scan --repo .
      - name: Audit this repository
        run: PYTHONPATH=src python -m oss_maintainer_kit audit --repo . --fail-under 85
